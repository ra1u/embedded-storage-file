name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Format & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.rust }}, ${{ matrix.deps }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust: ["1.87", stable, beta]
        deps: [latest, minimal]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (${{ matrix.rust }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Install nightly (for -Z direct-minimal-versions)
        if: matrix.deps == 'minimal'
        uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.rust }}-${{ matrix.deps }}

      - name: Resolve dependencies (latest)
        if: matrix.deps == 'latest'
        run: cargo update

      - name: Resolve dependencies (direct-minimal)
        if: matrix.deps == 'minimal'
        run: cargo +nightly update -Z direct-minimal-versions

      - name: cargo build
        run: cargo +${{ matrix.rust }} build --all-targets --verbose

      - name: cargo test
        run: cargo +${{ matrix.rust }} test --all-targets --verbose

      - name: cargo doc
        if: matrix.rust == 'stable' && matrix.deps == 'latest'
        run: cargo +stable doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
